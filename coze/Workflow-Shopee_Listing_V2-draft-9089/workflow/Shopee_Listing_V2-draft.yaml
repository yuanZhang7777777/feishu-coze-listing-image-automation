      type: code
      title: 组装标准商品图 Prompt
      icon: https://lf3-static.bytednsdoc.com/obj/eden-cn/dvsmryvd_avi_dvsm/ljhwZthlaukjlkulzlp/icon/icon-Code-v2.jpg
      description: "编写代码，处理输入变量来生成返回值"
      version: v2
      position:
        x: 3397.1960860956965
        y: 160.94443275316928
      parameters:
        code: |-
            async function main({ params }) {
              const productName = String(params.product_name || "").trim();
              const mode = String(params.mode || "").trim();
              const identityLock = String(params.identity_lock || "").trim();
              const points = String(params.points || "").trim();

              const task = {
                cutout: "Perform product subject isolation. Preserve the complete real product exactly as visible in the reference image. Remove packaging, manuals, display trays, people, hands, props, unrelated products, and environmental clutter. Do not redraw, redesign, or invent product structure.",
                semantic_extract: "Perform identity-constrained semantic extraction. Use the primary appearance in the reference image to reconstruct one clean, complete, structurally verifiable product reference while preserving product identity. Restore only areas supported by the immutable identity constraints and verified product facts. Do not invent structure, accessories, or appearance."
              }[mode];

              if (!task) {
                throw new Error(`不支持的标准图处理模式：${mode}`);
              }

              return {
                std_image_prompt: `Edit the reference image only. Do not redesign the product.

            Target product name: ${productName}
            Processing mode: ${mode}
            Immutable product identity constraints: ${identityLock}
            Verified product facts: ${points}

            Task: ${task}

            Keep an accessory only when the verified product facts explicitly identify it as a fixed part of the product. Never add accessories.

            Create one clean internal product reference image for downstream detail-image generation. Show the product complete, centered, unobstructed, uncropped, and clearly outlined, from a front view or the three-quarter view that best verifies its structure. Use a pure white or very light neutral-gray background, soft commercial studio lighting, and realistic materials.

            Do not change the product color, logo, shape, ports, controls, component count, arrangement, relative position, or proportions. Do not fabricate unseen structure. Do not render titles, captions, icons, borders, people, or decorative scenes.`
              };
            }
        language: 5
        node_inputs:
