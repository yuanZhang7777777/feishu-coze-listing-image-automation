      type: code
      title: 代码解析设计数组
      icon: https://lf3-static.bytednsdoc.com/obj/eden-cn/dvsmryvd_avi_dvsm/ljhwZthlaukjlkulzlp/icon/icon-Code-v2.jpg
      description: "编写代码，处理输入变量来生成返回值"
      version: v2
      position:
        x: 4627.836982714392
        y: -263.94478883690743
      parameters:
        code: |-
            async function main({ params }) {
              const text = String(params.raw || "")
                .trim()
                .replace(/^```(?:json)?\s*/i, "")
                .replace(/\s*```$/, "");

              const list = JSON.parse(text);

              if (!Array.isArray(list) || list.length < 6 || list.length > 8) {
                throw new Error("详情页设计必须是 6–8 项 JSON 数组");
              }

              const clean = list.map((item, index) => {
                if (typeof item !== "string" || !item.trim()) {
                  throw new Error(`第 ${index + 1} 项不是非空字符串`);
                }
                return item.trim();
              });

              return {
                design_list: clean
              };
            }
        language: 5
        node_inputs:
