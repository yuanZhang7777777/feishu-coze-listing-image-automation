                    value: null
                - name: prompt
                  input:
                    type: string
                    value: |-
                        请分析当前这一张自家商品图片。

                        产品名称：{{product_name}}
                        真实商品资料：{{points}}
                        当前图片由视觉理解输入 {{current_image}}提供。

                        严格按照系统规定的 JSON 结构输出，不要输出解释、Markdown 或代码围栏。
                - name: enableChatHistory
                  input:
                    type: boolean
                    value: false
                - name: chatHistoryRound
                  input:
                    type: integer
                    value: "3"
                - name: systemPrompt
                  input:
                    type: string
                    value: |-
                        你是跨境电商商品视觉证据分析师。你只分析当前这一张自家商品图片，目标是帮助后续节点从多张不同形式、可能混杂其他物品的图片中锁定同一个主商品。

                        你不做详情页设计，不写营销文案，不生成图片。你必须区分商品主体、包装、说明书、展示托盘、线材或其他配件、人物、手、背景道具及其他商品，不能把包装盒或配件误判为主商品。

                        分析规则：

                        1. 使用 {{product_name}} 定位目标商品，使用 {{points}} 核对商品事实、款式和明确结构。
                        2. 当前图片可能是干净商品图、白底图、场景图、人物使用图、局部细节、商品与包装混拍、包装图、说明书、配件、多款混拍、无关图片或模糊图片。
                        3. 包装盒上的照片和文字只能作为辅助证据，不能代替真实商品实物。
                        4. 必须分别识别商品主体、包装、说明书、展示托盘、线材、可拆配件、人物、背景道具和其他商品。
                        5. 可以记录实际可见的颜色、外形、Logo、接口、按钮、部件位置和结构数量，但这些观察只用于外观一致性，不能自动变成营销卖点。
                        6. points 明确写出的数量、排列、颜色、接口、配件和不可改变结构优先级最高。
                        7. 图片与 points 冲突时记录冲突，不自行裁决。
                        8. 无法确定时输出 unknown、null 或空数组，不得猜测。
                        9. reference_quality 评分：
                           90–100：完整清楚、真实实物、结构可核对、背景干净；
                           70–89：商品完整清楚，但有人物、包装或复杂背景；
                           40–69：只有局部、遮挡较多或角度不利；
                           0–39：无法可靠识别。
                        10. recommended_use：
                           reuse：可直接作干净商品参考；
                           cutout_source：商品清楚，可直接抠图；
                           semantic_extract_source：商品能确认，但复杂混拍使普通抠图不足；
                           evidence_only：只用于补充细节证据；
                           reject：无关或无法使用。

                        只输出一个合法 JSON，不要 Markdown、代码围栏或解释：

                        {
                          "image_role": "clean_product|mixed_product_package|detail|usage_scene|package_only|manual_only|accessory_only|multiple_variants|unrelated|unclear",
                          "contains_target_product": true,
                          "target_is_physical_product": true,
                          "target_visibility": 0,
                          "target_complete": true,
                          "reference_quality": 0,
                          "background_complexity": "low|medium|high",
                          "observed_identity": {
                            "category": "",
                            "dominant_colors": [],
                            "overall_shape": "",
                            "materials_visually_observed": [],
                            "logos_or_markings": [],
                            "controls_ports_connectors": [],
                            "distinctive_parts": [],
                            "count_observations": [
                              {
                                "part": "",
                                "count": null,
                                "confidence": 0
                              }
                            ]
                          },
                          "non_target_objects": [],
                          "text_or_package_clues": [],
                          "conflicts_with_points": [],
                          "recommended_use": "reuse|cutout_source|semantic_extract_source|evidence_only|reject",
                          "reason": ""
                        }

                        所有 0–100 字段必须是整数。没有内容的数组输出 []，无法确定的数量输出 null。
                - name: stableSystemPrompt
                  input:
                    type: string
                    value: ""
                - name: canContinue
                  input:
                    type: boolean
                    value: false
                - name: loopPromptVersion
                  input:
                    type: string
                    value: ""
                - name: loopPromptName
                  input:
                    type: string
                    value: ""
                - name: loopPromptId
                  input:
                    type: string
                    value: ""
            node_inputs:
                - name: product_name
                  input:
                    value:
                        path: product_name
                        ref_node: "100001"
                - name: points
                  input:
                    value:
                        path: points
