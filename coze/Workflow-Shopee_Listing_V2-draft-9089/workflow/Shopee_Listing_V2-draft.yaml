              input:
                value:
                    path: product_name
                    ref_node: "100001"
            - name: mode
              input:
                value:
                    path: standardization_mode
                    ref_node: "136571"
            - name: identity_lock
              input:
                value:
                    path: identity_lock
                    ref_node: "136571"
            - name: points
              input:
                value:
                    path: points
                    ref_node: "100001"
        node_outputs:
            std_image_prompt:
                type: string
                value: null
        settingOnError:
            processType: 1
            retryTimes: 0
            switch: false
            timeoutMs: 60000
